<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pie Chart</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
}

.container {
  margin-top: 50px;
}

/* PIE */
.pie {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  margin: auto;
}

/* LEGEND */
.legend {
  margin-top: 20px;
}

.legend div {
  margin: 5px;
}
</style>

</head>
<body>

<div class="container">
  <h2>Attendance Distribution</h2>

  <div class="pie" id="pie"></div>

  <div class="legend" id="legend"></div>
</div>

<script>
// DATA
const data = {
  Present: 70,
  Absent: 20,
  Leave: 10
};

const colors = {
  Present: "#777",
  Absent: "#aaa",
  Leave: "#ccc"
};

// TOTAL
const total = Object.values(data).reduce((a, b) => a + b, 0);

// BUILD GRADIENT
let start = 0;
let gradient = "";

Object.entries(data).forEach(([key, value]) => {
  const percent = (value / total) * 100;
  gradient += `${colors[key]} ${start}% ${start + percent}%, `;
  start += percent;
});

gradient = gradient.slice(0, -2);

// APPLY
document.getElementById("pie").style.background =
  `conic-gradient(${gradient})`;

// LEGEND
const legend = document.getElementById("legend");
Object.entries(data).forEach(([key, value]) => {
  const div = document.createElement("div");
  div.innerText = `${key}: ${value}`;
  legend.appendChild(div);
});
</script>

</body>
</html>
