<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blog Layout</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* HEADER */
.header {
  background: #fff;
  padding: 15px 20px;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

/* MAIN LAYOUT */
.main {
  display: flex;
  width: 90%;
  margin: 20px auto;
  gap: 20px;
}

/* SIDEBAR */
.sidebar {
  width: 25%;
  background: white;
  padding: 15px;
  border: 1px solid #ddd;
}

/* CONTENT */
.content {
  width: 75%;
  background: white;
  padding: 15px;
  border: 1px solid #ddd;
}

/* POSTS */
.post {
  margin-bottom: 15px;
  border-bottom: 1px solid #eee;
  padding-bottom: 10px;
}

.post-title {
  font-weight: bold;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 10px;
  background: #fff;
  border-top: 1px solid #ddd;
  margin-top: 20px;
}
</style>

</head>
<body>

<div class="header">My Blog</div>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h4>Categories</h4>
    <ul>
      <li>Technology</li>
      <li>Education</li>
      <li>Programming</li>
    </ul>

    <h4>About</h4>
    <p>Simple blog layout example.</p>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="post">
      <div class="post-title">Post Title 1</div>
      <p>Short description of the blog post...</p>
    </div>

    <div class="post">
      <div class="post-title">Post Title 2</div>
      <p>Another blog content preview...</p>
    </div>

    <div class="post">
      <div class="post-title">Post Title 3</div>
      <p>More sample content...</p>
    </div>

  </div>

</div>

<div class="footer">© 2026 My Blog</div>

</body>
</html>
