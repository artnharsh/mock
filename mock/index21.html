<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weekly Timetable</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.container {
  width: 90%;
  margin: 30px auto;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
  font-size: 14px;
}

th {
  background: #eee;
}

.break {
  background: #ddd;
  font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
  <h2>Weekly Timetable</h2>

  <table>
    <tr>
      <th>Time</th>
      <th>Monday</th>
      <th>Tuesday</th>
      <th>Wednesday</th>
      <th>Thursday</th>
      <th>Friday</th>
    </tr>

    <tr>
      <td>9–10</td>
      <td rowspan="2">Math</td>
      <td>Physics</td>
      <td rowspan="2">Chemistry</td>
      <td>English</td>
      <td>CS</td>
    </tr>

    <tr>
      <td>10–11</td>
      <td>Biology</td>
      <td>Math</td>
      <td>Physics</td>
    </tr>

    <tr>
      <td>11–12</td>
      <td>English</td>
      <td rowspan="2">CS Lab</td>
      <td>Math</td>
      <td>Chemistry</td>
      <td rowspan="2">Project</td>
    </tr>

    <tr>
      <td>12–1</td>
      <td>Physics</td>
      <td>Biology</td>
      <td>Math</td>
    </tr>

    <!-- BREAK -->
    <tr>
      <td colspan="6" class="break">Lunch Break</td>
    </tr>

    <tr>
      <td>2–3</td>
      <td>CS</td>
      <td>Math</td>
      <td>English</td>
      <td rowspan="2">Lab</td>
      <td>Physics</td>
    </tr>

    <tr>
      <td>3–4</td>
      <td>Chemistry</td>
      <td>Biology</td>
      <td>CS</td>
      <td>Math</td>
    </tr>

  </table>
</div>

</body>
</html>
