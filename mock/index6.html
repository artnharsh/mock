<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Gallery</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

.container {
  width: 80%;
  margin: 40px auto;
}

h2 {
  text-align: center;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

.card {
  background: white;
  border: 1px solid #ddd;
  padding: 15px;
  width: 180px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

button {
  margin-top: 10px;
  padding: 6px 10px;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">
  <h2>Product Gallery</h2>
  <div class="gallery" id="gallery"></div>
</div>

<!-- EMBEDDED JSON -->
<script type="application/json" id="productData">
[
  {
    "name": "Headphones",
    "price": 1499,
    "image": "https://via.placeholder.com/150"
  },
  {
    "name": "Smart Watch",
    "price": 2999,
    "image": "https://via.placeholder.com/150"
  },
  {
    "name": "Keyboard",
    "price": 999,
    "image": "https://via.placeholder.com/150"
  },
  {
    "name": "Mouse",
    "price": 499,
    "image": "https://via.placeholder.com/150"
  }
]
</script>

<script>
// GET JSON FROM SCRIPT TAG
const data = JSON.parse(document.getElementById("productData").textContent);

const gallery = document.getElementById("gallery");

// RENDER PRODUCTS
data.forEach((product, index) => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${product.image}">
    <h3>${product.name}</h3>
    <p>₹${product.price}</p>
    <button onclick="buyProduct(${index})">Buy Now</button>
  `;

  gallery.appendChild(card);
});

// BUY INTERACTION
function buyProduct(index) {
  const product = data[index];
  alert(product.name + " purchased!");
}
</script>

</body>
</html>
