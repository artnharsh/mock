<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doughnut Chart</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
}

.container {
  width: 400px;
  margin: 50px auto;
}

canvas {
  background: white;
  border: 1px solid #ddd;
}
</style>

</head>
<body>

<div class="container">
  <h2>Attendance Distribution</h2>
  <canvas id="chart"></canvas>
</div>

<script>
const ctx = document.getElementById("chart");

new Chart(ctx, {
  type: "doughnut",
  data: {
    labels: ["Present", "Absent", "Leave"],
    datasets: [{
      data: [70, 20, 10],
      backgroundColor: ["#777", "#aaa", "#ccc"]
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: {
        position: "bottom"
      }
    }
  }
});
</script>

</body>
</html>
