<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
}

.container {
  width: 90%;
  margin: 30px auto;
}

.section {
  background: white;
  padding: 15px;
  margin: 15px 0;
  border: 1px solid #ddd;
}
</style>

</head>
<body>

<div class="container">
  <h2>Weather Dashboard</h2>

  <div class="section">
    <canvas id="bar"></canvas>
  </div>

  <div class="section">
    <canvas id="line"></canvas>
  </div>

  <div class="section">
    <canvas id="pie"></canvas>
  </div>

</div>

<script>
const labels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const temps = [30,35,28,32,36,31,29];

// BAR
new Chart(document.getElementById("bar"), {
  type: "bar",
  data: {
    labels,
    datasets: [{ label: "Temp", data: temps }]
  }
});

// LINE
new Chart(document.getElementById("line"), {
  type: "line",
  data: {
    labels,
    datasets: [{ label: "Trend", data: temps }]
  }
});

// PIE
const dist = { Hot:0, Mild:0, Cool:0 };

temps.forEach(t=>{
  if(t>33) dist.Hot++;
  else if(t>29) dist.Mild++;
  else dist.Cool++;
});

new Chart(document.getElementById("pie"), {
  type: "pie",
  data: {
    labels: Object.keys(dist),
    datasets: [{
      data: Object.values(dist)
    }]
  }
});
</script>

</body>
</html>
