<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Preview</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

.container {
  width: 70%;
  margin: 40px auto;
  display: flex;
  justify-content: space-between;
}

/* FORM */
.form {
  width: 45%;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 8px 0;
}

/* CARD */
.card {
  width: 45%;
  background: white;
  padding: 20px;
  border: 1px solid #ddd;
  text-align: center;
}

.card img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
}

.name {
  font-size: 18px;
  font-weight: bold;
}

.bio {
  font-size: 14px;
  color: #555;
}
</style>

</head>
<body>

<div class="container">

  <!-- INPUT FORM -->
  <div class="form">
    <h3>Enter Details</h3>

    <input type="text" id="nameInput" placeholder="Name">
    <input type="text" id="imageInput" placeholder="Image URL">
    <textarea id="bioInput" placeholder="Bio"></textarea>
  </div>

  <!-- PROFILE CARD -->
  <div class="card">
    <img id="previewImage" src="https://via.placeholder.com/80">
    <div class="name" id="previewName">Your Name</div>
    <div class="bio" id="previewBio">Your bio will appear here</div>
  </div>

</div>

<script>
// INPUTS
const nameInput = document.getElementById("nameInput");
const imageInput = document.getElementById("imageInput");
const bioInput = document.getElementById("bioInput");

// PREVIEW ELEMENTS
const previewName = document.getElementById("previewName");
const previewImage = document.getElementById("previewImage");
const previewBio = document.getElementById("previewBio");

// REAL-TIME UPDATE
nameInput.addEventListener("input", () => {
  previewName.innerText = nameInput.value || "Your Name";
});

imageInput.addEventListener("input", () => {
  previewImage.src = imageInput.value || "https://via.placeholder.com/80";
});

bioInput.addEventListener("input", () => {
  previewBio.innerText = bioInput.value || "Your bio will appear here";
});
</script>

</body>
</html>
