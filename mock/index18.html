<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes App</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.container {
  width: 400px;
  margin: 50px auto;
}

h2 {
  text-align: center;
}

/* INPUT */
textarea {
  width: 100%;
  height: 60px;
  padding: 8px;
  border: 1px solid #ccc;
}

button {
  margin-top: 8px;
  padding: 8px;
  border: 1px solid #ccc;
  background: #eee;
  cursor: pointer;
}

button:hover {
  background: #ddd;
}

/* NOTES */
.note {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
}

.delete {
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">
  <h2>Notes</h2>

  <textarea id="noteInput" placeholder="Write a note..."></textarea>
  <button onclick="addNote()">Add Note</button>

  <div id="notesContainer"></div>
</div>

<script>
const input = document.getElementById("noteInput");
const container = document.getElementById("notesContainer");

// LOAD FROM STORAGE
let notes = JSON.parse(localStorage.getItem("notes")) || [];

// RENDER
function render() {
  container.innerHTML = "";

  notes.forEach((note, index) => {
    const div = document.createElement("div");
    div.className = "note";

    div.innerHTML = `
      <span>${note}</span>
      <span class="delete" onclick="deleteNote(${index})">✕</span>
    `;

    container.appendChild(div);
  });
}

// SAVE
function save() {
  localStorage.setItem("notes", JSON.stringify(notes));
}

// ADD
function addNote() {
  const text = input.value.trim();
  if (!text) return;

  notes.push(text);
  input.value = "";

  save();
  render();
}

// DELETE
function deleteNote(index) {
  notes.splice(index, 1);
  save();
  render();
}

// INIT
render();
</script>

</body>
</html>
