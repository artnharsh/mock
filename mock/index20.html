<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration Form</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.container {
  width: 400px;
  margin: 50px auto;
  background: white;
  padding: 20px 25px;
  border: 1px solid #ddd;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* FORM GROUP */
.form-group {
  margin-bottom: 12px;
}

label {
  display: block;
  font-size: 14px;
  margin-bottom: 4px;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 7px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* RADIO GROUP */
.radio-group {
  display: flex;
  gap: 10px;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  background: #eee;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #ddd;
}
</style>

</head>
<body>

<div class="container">
  <h2>Student Registration</h2>

  <form>

    <div class="form-group">
      <label>Name</label>
      <input type="text" placeholder="Enter your name" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <label>Gender</label>
      <div class="radio-group">
        <label><input type="radio" name="gender"> Male</label>
        <label><input type="radio" name="gender"> Female</label>
      </div>
    </div>

    <div class="form-group">
      <label>Course</label>
      <select>
        <option>Select course</option>
        <option>B.Tech</option>
        <option>BCA</option>
        <option>MCA</option>
      </select>
    </div>

    <div class="form-group">
      <label>Address</label>
      <textarea rows="3" placeholder="Enter your address"></textarea>
    </div>

    <button type="submit">Register</button>

  </form>
</div>

</body>
</html>
