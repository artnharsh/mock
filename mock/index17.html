<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Filter</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.container {
  width: 85%;
  margin: 40px auto;
}

h2 {
  text-align: center;
}

/* FILTERS */
.filters {
  text-align: center;
  margin-bottom: 20px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: 1px solid #ccc;
  background: #eee;
  cursor: pointer;
}

button:hover {
  background: #ddd;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: white;
  border: 1px solid #ddd;
  padding: 10px;
}

/* IMAGE PLACEHOLDER */
.image {
  height: 120px;
  background: #e0e0e0;
  margin-bottom: 10px;
}

/* TEXT */
.name {
  font-weight: bold;
  margin-bottom: 5px;
}

.category {
  font-size: 12px;
  color: #777;
}

.price {
  margin-top: 5px;
}
</style>

</head>
<body>

<div class="container">
  <h2>Products</h2>

  <div class="filters">
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('electronics')">Electronics</button>
    <button onclick="filterProducts('clothing')">Clothing</button>
  </div>

  <div class="grid" id="productGrid"></div>
</div>

<script>
// DATA
const products = [
  { name: "Headphones", category: "electronics", price: 1500 },
  { name: "Keyboard", category: "electronics", price: 800 },
  { name: "T-Shirt", category: "clothing", price: 500 },
  { name: "Jeans", category: "clothing", price: 1200 }
];

const grid = document.getElementById("productGrid");

// RENDER
function render(items) {
  grid.innerHTML = "";

  items.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="image"></div>
      <div class="name">${p.name}</div>
      <div class="category">${p.category}</div>
      <div class="price">₹${p.price}</div>
    `;

    grid.appendChild(div);
  });
}

// FILTER
function filterProducts(category) {
  if (category === "all") {
    render(products);
  } else {
    render(products.filter(p => p.category === category));
  }
}

// INIT
render(products);
</script>

</body>
</html>
