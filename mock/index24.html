<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Gallery</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.container {
  width: 85%;
  margin: 30px auto;
}

h2 {
  text-align: center;
}

/* FORM */
.form {
  text-align: center;
  margin-bottom: 15px;
}

input, select {
  margin: 5px;
  padding: 5px;
}

/* FILTER */
.filters {
  text-align: center;
  margin-bottom: 15px;
}

button {
  padding: 6px 10px;
  margin: 5px;
  border: 1px solid #ccc;
  background: #eee;
  cursor: pointer;
}

button:hover {
  background: #ddd;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
}

/* CARD */
.card {
  position: relative;
  background: white;
  border: 1px solid #ddd;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.label {
  text-align: center;
  font-size: 12px;
  padding: 5px;
}

/* DELETE BUTTON */
.delete {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #fff;
  border: 1px solid #ccc;
  padding: 2px 6px;
  cursor: pointer;
  font-size: 12px;
}
</style>

</head>
<body>

<div class="container">

  <h2>Image Gallery</h2>

  <!-- ADD -->
  <div class="form">
    <input type="file" id="imageInput">
    <select id="categoryInput">
      <option value="nature">Nature</option>
      <option value="city">City</option>
    </select>
    <button onclick="addImage()">Add Image</button>
  </div>

  <!-- FILTER -->
  <div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
  </div>

  <!-- GALLERY -->
  <div class="gallery" id="gallery"></div>

</div>

<script>
let images = [
  { src: "https://via.placeholder.com/150", category: "nature" },
  { src: "https://via.placeholder.com/150", category: "city" }
];

let currentFilter = "all";

const gallery = document.getElementById("gallery");

// RENDER
function render() {
  gallery.innerHTML = "";

  images.forEach((img, index) => {
    if (currentFilter !== "all" && img.category !== currentFilter) return;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <button class="delete" onclick="deleteImage(${index})">✕</button>
      <img src="${img.src}">
      <div class="label">${img.category}</div>
    `;

    gallery.appendChild(div);
  });
}

// FILTER
function filterImages(category) {
  currentFilter = category;
  render();
}

// ADD
function addImage() {
  const fileInput = document.getElementById("imageInput");
  const category = document.getElementById("categoryInput").value;

  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    images.push({
      src: e.target.result,
      category: category
    });

    render();
  };

  reader.readAsDataURL(file);
}

// DELETE
function deleteImage(index) {
  images.splice(index, 1);
  render();
}

// INIT
render();
</script>

</body>
</html>
