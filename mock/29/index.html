<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Records</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
}

.container {
  width: 60%;
  margin: 30px auto;
}

input {
  padding: 8px;
  margin: 5px;
}

button {
  padding: 8px;
}

.card {
  background: white;
  margin: 10px 0;
  padding: 10px;
}
</style>

</head>
<body>

<div class="container">
  <h2>Student Records</h2>

  <input id="name" placeholder="Name">
  <input id="roll" placeholder="Roll No">
  <input id="branch" placeholder="Branch">
  <button onclick="addStudent()">Add</button>

  <h3>All Students</h3>
  <div id="list"></div>
</div>

<script>
const API = "http://localhost:3000";

// add student
async function addStudent() {
  const name = document.getElementById("name").value;
  const roll = document.getElementById("roll").value;
  const branch = document.getElementById("branch").value;

  await fetch(API + "/add", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, roll, branch })
  });

  loadStudents();
}

// load students
async function loadStudents() {
  const res = await fetch(API + "/students");
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(s => {
    list.innerHTML += `
      <div class="card">
        ${s.name} | ${s.roll} | ${s.branch}
      </div>
    `;
  });
}

loadStudents();
</script>

</body>
</html>
