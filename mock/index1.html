<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Glossary</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

.container {
  width: 60%;
  margin: 40px auto;
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
}

th {
  background: #eee;
}
</style>

</head>
<body>

<div class="container">
  <h2>HTML Glossary</h2>

  <input type="text" id="search" placeholder="Search tags...">

  <table>
    <thead>
      <tr>
        <th>Tag</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td>&lt;p&gt;</td><td>Paragraph</td></tr>
      <tr><td>&lt;a&gt;</td><td>Anchor (link)</td></tr>
      <tr><td>&lt;div&gt;</td><td>Division/container</td></tr>
      <tr><td>&lt;img&gt;</td><td>Image</td></tr>
      <tr><td>&lt;h1&gt;</td><td>Heading</td></tr>
      <tr><td>&lt;ul&gt;</td><td>Unordered List</td></tr>
      <tr><td>&lt;li&gt;</td><td>List Item</td></tr>
    </tbody>
  </table>
</div>

<script>
const search = document.getElementById("search");
const rows = document.querySelectorAll("#tableBody tr");

search.addEventListener("keyup", () => {
  let value = search.value.toLowerCase();

  rows.forEach(row => {
    let text = row.innerText.toLowerCase();
    row.style.display = text.includes(value) ? "" : "none";
  });
});
</script>

</body>
</html>
