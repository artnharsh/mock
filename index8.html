<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fafafa;
}

.container {
  width: 85%;
  margin: 40px auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 8px;
  background: #000;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  transition: transform 0.4s ease;
}

/* ZOOM */
.card:hover img {
  transform: scale(1.1);
}

/* OVERLAY */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.card:hover .overlay {
  opacity: 1;
}
</style>

</head>
<body>

<div class="container">
  <h2>Photo Gallery</h2>

  <div class="gallery">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
      <div class="overlay">Mountain View</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
      <div class="overlay">Forest Path</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3">
      <div class="overlay">Ocean Waves</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
      <div class="overlay">City Lights</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <div class="overlay">Desert</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e">
      <div class="overlay">Sunset Lake</div>
    </div>

  </div>
</div>

</body>
</html>
