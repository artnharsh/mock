<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.container {
  width: 300px;
  margin: 60px auto;
}

h2 {
  text-align: center;
}

/* INPUT */
.input-box {
  display: flex;
  gap: 5px;
}

input {
  flex: 1;
  padding: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 8px;
  border: 1px solid #ccc;
  background: #eee;
  cursor: pointer;
}

button:hover {
  background: #ddd;
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
  margin-top: 15px;
}

li {
  background: white;
  padding: 8px;
  margin: 5px 0;
  border: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.delete {
  cursor: pointer;
  font-size: 14px;
}
</style>

</head>
<body>

<div class="container">
  <h2>To-Do List</h2>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
const input = document.getElementById("taskInput");
const list = document.getElementById("taskList");

// ADD TASK
function addTask() {
  const text = input.value.trim();
  if (text === "") return;

  const li = document.createElement("li");

  li.innerHTML = `
    <span>${text}</span>
    <span class="delete" onclick="deleteTask(this)">✕</span>
  `;

  list.appendChild(li);
  input.value = "";
}

// DELETE TASK
function deleteTask(el) {
  el.parentElement.remove();
}
</script>

</body>
</html>
